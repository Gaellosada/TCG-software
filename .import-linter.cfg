[importlinter]
root_package = tcg

[importlinter:contract:core-engine-types]
name = core -> engine -> types
type = layers
layers =
    tcg.core
    tcg.engine
    tcg.types

[importlinter:contract:core-data-types]
name = core -> data -> types
type = layers
layers =
    tcg.core
    tcg.data
    tcg.types

[importlinter:contract:engine-data-isolation]
name = Engine and data are independent (neither imports the other)
type = independence
modules =
    tcg.engine
    tcg.data

[importlinter:contract:persistence-write-boundary]
name = Only tcg.persistence may construct/use the scoped write client
type = forbidden
source_modules =
    tcg.types
    tcg.data
    tcg.engine
    tcg.core.indicators
forbidden_modules =
    tcg.persistence
